services:
  memoryos-api:
    build: .
    image: memoryos-eval-api:latest
    container_name: memoryos-api
    ports:
      - "18002:8000"
    environment:
      - MEMORYOS_API_DATA_DIR=/app/eval/api_memory_data
    volumes:
      - /data/memoryos-api-data:/app/eval/api_memory_data
    command: uvicorn api_server:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

